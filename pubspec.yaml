name: ztcd_v3
description: Zero-Touch Car Diagnostics - AI-powered OBD-II vehicle diagnostics app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bluetooth_serial: ^0.4.0
  google_generative_ai: ^0.4.6
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  sensors_plus: ^6.1.1
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  intl: ^0.19.0
  fl_chart: ^0.70.2
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# flutter_bluetooth_serial 0.4.0 (the latest upstream release) is missing the
# `android { namespace }` block required by AGP 8+.  Until a fixed version is
# published, we use a vendored copy that adds only the namespace declaration.
dependency_overrides:
  flutter_bluetooth_serial:
    path: third_party/flutter_bluetooth_serial

flutter:
  uses-material-design: true
