name: Build & Release Android APK

# Required secrets for signed release builds (all four must be set together):
#   ANDROID_KEYSTORE_BASE64    – base64-encoded keystore file (base64 -w0 release.jks)
#   ANDROID_KEYSTORE_PASSWORD  – keystore password
#   ANDROID_KEY_ALIAS          – key alias inside the keystore
#   ANDROID_KEY_PASSWORD       – key password
# Optional:
#   MAPS_API_KEY               – Google Maps API key (build succeeds without it)

on:
  push:
    branches:
      - main
      - 'copilot/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Android SDK 36
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-36"

      - name: Validate and decode keystore
        # Sets KEYSTORE_PATH in $GITHUB_ENV only when all four signing secrets
        # are present.  Fails fast with a descriptive error if the keystore
        # secret is supplied but any of the other three are missing, which
        # would otherwise cause a cryptic Gradle error later.
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            missing=""
            [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ] && missing="${missing} ANDROID_KEYSTORE_PASSWORD"
            [ -z "${ANDROID_KEY_ALIAS:-}"          ] && missing="${missing} ANDROID_KEY_ALIAS"
            [ -z "${ANDROID_KEY_PASSWORD:-}"       ] && missing="${missing} ANDROID_KEY_PASSWORD"
            if [ -n "${missing}" ]; then
              echo "::error::ANDROID_KEYSTORE_BASE64 is set but the following required signing secrets are missing:${missing}"
              echo "::error::All four signing secrets must be configured together in Settings → Secrets and variables → Actions."
              exit 1
            fi
            KEYSTORE_PATH="${RUNNER_TEMP}/release.jks"
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${KEYSTORE_PATH}"
            echo "KEYSTORE_PATH=${KEYSTORE_PATH}" >> "$GITHUB_ENV"
          fi

      # Debug APK – always built; does not require any signing secrets.
      # Download from: Actions run → Artifacts → app-debug-apk
      - name: Build debug APK
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          set -euo pipefail
          flutter build apk --debug \
            ${MAPS_API_KEY:+--dart-define=MAPS_API_KEY=$MAPS_API_KEY}

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          # Artifact is debug-signed; suitable for sideloading and testing only.
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Build release APK
        if: env.KEYSTORE_PATH != ''
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          set -euo pipefail
          flutter build apk --release \
            ${MAPS_API_KEY:+--dart-define=MAPS_API_KEY=$MAPS_API_KEY}

      - name: Publish GitHub Release
        if: env.KEYSTORE_PATH != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ZTCDv1.0BETA
          name: ZTCDv1.0BETA
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
