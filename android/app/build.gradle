plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.ztcd.app"
    compileSdk 36

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.ztcd.app"
        minSdk 21
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true

        // Resolve ${MAPS_API_KEY} placeholder in AndroidManifest.xml.
        // Reads from: environment variable MAPS_API_KEY (CI/CD) or Gradle project
        // property -PMAPS_API_KEY (local builds via android/gradle.properties).
        // Falls back to empty string so the app still launches without a key.
        def mapsKey = System.getenv('MAPS_API_KEY') ?: project.findProperty('MAPS_API_KEY') ?: ''
        manifestPlaceholders = [
            applicationName: "io.flutter.app.FlutterMultiDexApplication",
            MAPS_API_KEY: mapsKey
        ]
    }

    signingConfigs {
        release {
            def keystorePath  = System.getenv('KEYSTORE_PATH') ?: ''
            def keystorePass  = System.getenv('ANDROID_KEYSTORE_PASSWORD') ?: ''
            def keyAliasValue = System.getenv('ANDROID_KEY_ALIAS') ?: ''
            def keyPass       = System.getenv('ANDROID_KEY_PASSWORD') ?: ''
            if (keystorePath) {
                if (!keystorePass || !keyAliasValue || !keyPass) {
                    throw new GradleException(
                        "KEYSTORE_PATH is set but one or more signing variables are missing: " +
                        "ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD")
                }
                storeFile     file(keystorePath)
                storePassword keystorePass
                keyAlias      keyAliasValue
                keyPassword   keyPass
            }
        }
    }

    buildTypes {
        release {
            def keystorePath = System.getenv('KEYSTORE_PATH') ?: ''
            signingConfig keystorePath ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:${project.findProperty('kotlinVersion') ?: '1.9.10'}"
}