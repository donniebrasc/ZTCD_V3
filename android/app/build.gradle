def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    namespace "com.ztcd.app"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.ztcd.app"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true

        // Resolve ${MAPS_API_KEY} placeholder in AndroidManifest.xml.
        // Populated by: flutter build apk --dart-define=MAPS_API_KEY=AIza...
        // Falls back to empty string so the app still launches without a key.
        def mapsKey = project.findProperty('MAPS_API_KEY') ?: ''
        manifestPlaceholders = [MAPS_API_KEY: mapsKey]
    }

    signingConfigs {
        release {
            def keystorePath  = System.getenv('KEYSTORE_PATH') ?: ''
            def keystorePass  = System.getenv('ANDROID_KEYSTORE_PASSWORD') ?: ''
            def keyAliasValue = System.getenv('ANDROID_KEY_ALIAS') ?: ''
            def keyPass       = System.getenv('ANDROID_KEY_PASSWORD') ?: ''
            if (keystorePath) {
                if (!keystorePass || !keyAliasValue || !keyPass) {
                    throw new GradleException(
                        "KEYSTORE_PATH is set but one or more signing variables are missing: " +
                        "ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD")
                }
                storeFile     file(keystorePath)
                storePassword keystorePass
                keyAlias      keyAliasValue
                keyPassword   keyPass
            }
        }
    }

    buildTypes {
        release {
            def keystorePath = System.getenv('KEYSTORE_PATH') ?: ''
            signingConfig keystorePath ? signingConfigs.release : signingConfigs.debug
            minifyEnabled false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}
